    <style>
      @keyframes subtle-pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.05);
          opacity: 1;
        }
      }
      .animate-subtle-pulse {
        animation: subtle-pulse 3s infinite;
        animation-delay: 15s;
      }
      /* Hide default summary marker */
      details > summary { list-style: none; }
      details > summary::-webkit-details-marker { display: none; }
      /* Animate chevron on details open */
      details[open] > summary .chevron-rotate {
        transform: rotate(180deg);
      }
      /* Basic styles for markdown rendering in chat */
      .prose ul { list-style-type: disc; margin-left: 1.25rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
      .prose ol { list-style-type: decimal; margin-left: 1.25rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
      .prose p { margin-top: 0; margin-bottom: 0.5rem; }
      .prose p:first-child { margin-top: 0; }
      .prose p:last-child { margin-bottom: 0; }
      .prose strong { font-weight: 600; }
    </style>
